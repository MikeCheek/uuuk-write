name: Orders Overdue Check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check-overdue-orders:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Trigger orders overdue check
        run: |
          curl --fail -X POST \
            -H "x-orders-overdue-cron-secret: ${{ secrets.ORDERS_OVERDUE_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://uuuk.it/api/orders-overdue-check
